{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="product-detail-page">
    <div class="product-detail-card">
        <div class="product-detail-image">
            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
            {% else %}
                <div class="product-no-image">Нет фото</div>
            {% endif %}
        </div>
        <div class="product-detail-info">
            <p class="back-link"><a href="{% url 'products:list' %}">← Вернуться к каталогу</a></p>
            <h1>{{ product.name }}</h1>
            <p class="product-category">Категория: {{ product.category.name }}</p>
            <p class="product-description">{{ product.description }}</p>
            <div class="product-detail-bottom">
                <p class="product-price">Цена: {{ product.price }} ₸</p>
                <form action="{% url 'cart:add' product.id %}" method="post" class="product-detail-form">
                    {% csrf_token %}
                    <label for="quantity">Количество</label>
                    <input id="quantity" type="number" name="quantity" min="1" value="1" class="quantity-input">
                    <button type="submit" class="buy-btn">Добавить в корзину</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
